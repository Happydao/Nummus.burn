<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NUMMUS BURN — Live</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Cinzel', serif;
  color:#fff;
  background:#000;
  overflow-x:hidden;
}

/* VIDEO SFONDO */
#bgvid{
  position:fixed;
  top:0;left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:-3;
}
#overlay{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  background:rgba(0,0,0,0.65);
  z-index:-2;
}

/* TOP LINK CARD */
.topLinkCard{
  position:fixed;
  top:15px;right:15px;
  background:rgba(25,25,25,0.7);
  border:1px solid rgba(230,210,160,0.5);
  padding:5px 9px;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
  font-size:12px;
  backdrop-filter:blur(4px);
  transition:0.25s;
  z-index:50;
  text-shadow:0 2px 4px rgba(0,0,0,0.6);
}
.topLinkCard:hover{
  color:#a73737;
  border-color:#a73737;
  box-shadow:0 0 12px rgba(80,0,0,0.6);
}
@media(max-width:800px){
  .topLinkCard{
    position:static;
    display:block;
    width:max-content;
    margin:10px auto 0 auto;
    padding:4px 7px;
    font-size:11px;
  }
}

/* HEADER: LOGO - TITOLO - LOGO */
#headerBar{
  width:92%;
  max-width:1200px;
  margin:25px auto 10px auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
}

/* CARD LOGO CIRCOLARE */
.logoCard{
  flex:0 0 auto;
  width:120px;
  height:120px;
  border-radius:50%;
  border:2px solid rgba(230,210,160,0.9);
  background:rgba(5,5,5,0.35);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 0 10px rgba(0,0,0,0.8),
    0 0 18px rgba(180,140,70,0.7);
  transition:0.25s;
}
.logoCard img{
  width:80%;
  height:80%;
  object-fit:contain;
  filter:drop-shadow(0 0 4px #550000);
  animation:logoGlow 1.8s infinite alternate ease-in-out;
}
.logoCard:hover{
  box-shadow:
    0 0 18px rgba(0,0,0,0.9),
    0 0 26px rgba(120,20,20,0.85);
}
@keyframes logoGlow{
  0%{filter:drop-shadow(0 0 4px #3b0000);}
  100%{filter:drop-shadow(0 0 14px #b03838);}
}

/* CARD TITOLO: bordo rosso fisso */
.titleCard{
  flex:1;
  background:rgba(10,10,10,0.22);
  border:2px solid rgba(135,35,35,0.9);
  border-radius:18px;
  padding:18px 10px;
  text-align:center;
  backdrop-filter:blur(4px);
  box-shadow:0 0 20px rgba(0,0,0,0.9);
  transition:0.25s;
}
.titleCard:hover{
  box-shadow:0 0 28px rgba(80,0,0,0.85);
}

/* TITOLO CON GLOW ROSSO PULSANTE, STILE LOGHI */
.title{
  font-size:32px;
  font-weight:800;
  color:#f1e5c6;
  letter-spacing:2px;
  animation:titleGlow 1.9s infinite alternate ease-in-out;
}
@keyframes titleGlow{
  0%{
    text-shadow:
      0 2px 4px rgba(0,0,0,0.95),
      0 0 4px rgba(255,255,255,0.10),
      0 0 6px rgba(120,30,30,0.35),
      0 0 0 rgba(0,0,0,0);
  }
  100%{
    text-shadow:
      0 2px 6px rgba(0,0,0,1),
      0 0 4px rgba(255,255,255,0.08),
      0 0 14px rgba(185,40,40,0.9),
      0 0 22px rgba(185,40,40,0.7);
  }
}

/* MOBILE HEADER */
@media(max-width:800px){
  #headerBar{
    flex-wrap:wrap;
    justify-content:space-between;
  }
  .logoCard{
    width:96px;
    height:96px;
  }
  .logoCard:first-child{order:0;}
  .logoCard:last-child{order:1;}
  .titleCard{
    order:2;
    flex:1 1 100%;
  }
  .title{
    font-size:20px;
  }
}
/* MAIN WRAPPER */
#main{
  width:92%;
  max-width:1200px;
  margin:10px auto 30px auto;
}

/* GRIGLIA CARDS */
.cardsLayout{
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr 1fr;
  gap:16px;
  margin-top:20px;
}
@media(max-width:1000px){
  .cardsLayout{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
  .cardsLayout{grid-template-columns:1fr;}
}

/* CARD BASE, QUASI TRASPARENTE */
.card{
  background:rgba(5,5,5,0.18);
  border:2px solid rgba(180,140,70,0.6);
  border-radius:14px;
  padding:12px 14px;
  backdrop-filter:blur(2px);
  transition:0.25s;
  box-shadow:0 0 14px rgba(0,0,0,0.7);
}
.card:hover{
  border-color:rgba(125,32,32,0.85);
  box-shadow:0 0 20px rgba(80,0,0,0.75);
}
.card label{
  font-size:13px;
  color:#e7d8b3;
  text-shadow:0 2px 3px rgba(0,0,0,0.8);
}
.value{
  font-size:20px;
  font-weight:800;
  margin-top:4px;
  color:#ffffff;
  text-shadow:0 3px 5px rgba(0,0,0,0.9);
}

/* LINK: bianco -> rosso scuro */
.link{
  color:#ffffff;
  text-decoration:none;
  transition:0.25s;
  text-shadow:0 2px 4px rgba(0,0,0,0.9);
}
.link:hover{
  color:#a73737;
}

/* TABELLA: intestazione + 5 transazioni visibili */
.transactionsTable{
  max-height:264px;
  margin-top:26px;
  overflow:auto;
  border:2px solid rgba(180,140,70,0.6);
  border-radius:14px;
  background:rgba(5,5,5,0.22);
  backdrop-filter:blur(3px);
  box-shadow:0 0 18px rgba(0,0,0,0.8);
}
table{
  width:100%;
  border-collapse:collapse;
}
thead{
  background:rgba(50,35,20,0.5);
}
thead th{
  position:sticky;
  top:0;
  z-index:1;
  background:#302719;
}
th,td{
  height:44px;
  padding:0 14px;
  text-shadow:0 2px 3px rgba(0,0,0,0.9);
}
th{
  font-size:14px;
  color:#e7d8b3;
  font-weight:600;
}
th:nth-child(1), td:nth-child(1){text-align:left;}
th:nth-child(2), td:nth-child(2){text-align:left;}
th:nth-child(3), td:nth-child(3){text-align:left; white-space:nowrap;}
th:nth-child(4), td:nth-child(4){text-align:right;}

td{
  font-size:15px;
  color:#ffffff;
  border-bottom:1px solid rgba(180,140,70,0.25);
}
tbody tr:hover{
  background:rgba(90,15,15,0.3);
}

/* GRAFICO RIDUZIONE SUPPLY */
.supplyChart{
  margin-top:26px;
  padding:18px;
  border:2px solid rgba(180,140,70,0.6);
  border-radius:14px;
  background:rgba(5,5,5,0.28);
  backdrop-filter:blur(3px);
  box-shadow:0 0 18px rgba(0,0,0,0.8);
}
.chartHeader{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:18px;
}
.chartTitle h2{
  color:#f1e5c6;
  font-size:18px;
  letter-spacing:0.5px;
}
.chartTitle p{
  margin-top:5px;
  color:#cbbd9a;
  font-size:12px;
}
.chartControls{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:9px;
}
#chartSupplyValue{
  color:#fff;
  font-size:18px;
  font-weight:800;
  white-space:nowrap;
  text-shadow:0 3px 5px rgba(0,0,0,0.9);
}
.rangeSelector{
  display:grid;
  grid-template-columns:repeat(5, minmax(42px, 1fr));
  padding:3px;
  border:1px solid rgba(180,140,70,0.45);
  border-radius:8px;
  background:rgba(0,0,0,0.35);
}
.rangeSelector button{
  height:30px;
  padding:0 8px;
  border:0;
  border-radius:6px;
  color:#d7c8a4;
  background:transparent;
  cursor:pointer;
  font:600 11px 'Cinzel', serif;
}
.rangeSelector button:hover{
  color:#fff;
  background:rgba(135,35,35,0.35);
}
.rangeSelector button.active{
  color:#fff;
  background:#762626;
  box-shadow:0 0 8px rgba(150,35,35,0.45);
}
.chartPlot{
  position:relative;
  margin-top:14px;
  min-height:280px;
}
#supplyChartSvg{
  display:block;
  width:100%;
  height:auto;
  min-height:280px;
}
.chartGrid{stroke:rgba(231,216,179,0.17);stroke-width:1;}
.chartAxis{stroke:rgba(231,216,179,0.42);stroke-width:1.2;}
.chartLabel{fill:#cbbd9a;font:11px Arial,sans-serif;}
.chartAxisTitle{fill:#e7d8b3;font:600 11px 'Cinzel',serif;}
.supplyArea{fill:url(#supplyGradient);}
.supplyLine{
  fill:none;
  stroke:#b63b3b;
  stroke-width:3;
  stroke-linecap:round;
  stroke-linejoin:round;
  filter:drop-shadow(0 0 4px rgba(182,59,59,0.7));
}
.chartCrosshair{
  display:none;
  stroke:#e7d8b3;
  stroke-width:1;
  stroke-dasharray:4 4;
}
.chartHoverDot{
  display:none;
  fill:#180909;
  stroke:#e7d8b3;
  stroke-width:2.5;
}
.chartCapture{fill:transparent;cursor:crosshair;}
.chartTooltip{
  position:absolute;
  display:none;
  min-width:178px;
  padding:9px 11px;
  border:1px solid rgba(180,140,70,0.75);
  border-radius:8px;
  color:#fff;
  background:rgba(20,8,8,0.96);
  box-shadow:0 10px 25px rgba(0,0,0,0.65);
  pointer-events:none;
  transform:translate(-50%, -110%);
  z-index:3;
}
.chartTooltip strong{
  display:block;
  margin-bottom:6px;
  color:#e7d8b3;
  font-size:12px;
}
.tooltipRow{
  display:flex;
  justify-content:space-between;
  gap:16px;
  font:12px Arial,sans-serif;
}
.tooltipRow + .tooltipRow{margin-top:4px;}
.tooltipRow span{color:#cbbd9a;}
.chartEmpty{
  display:flex;
  min-height:280px;
  align-items:center;
  justify-content:center;
  padding:24px;
  color:#cbbd9a;
  font-size:13px;
  text-align:center;
}
@media(max-width:650px){
  .supplyChart{padding:14px;}
  .chartHeader{flex-direction:column;}
  .chartControls{width:100%;align-items:stretch;}
  #chartSupplyValue{text-align:left;}
  .rangeSelector{grid-template-columns:repeat(5, minmax(0, 1fr));}
  .rangeSelector button{padding:0 3px;}
  .chartPlot,#supplyChartSvg,.chartEmpty{min-height:220px;}
}

/* FOOTER */
footer{
  width:100%;
  text-align:center;
  margin:24px 0 32px 0;
  color:#e7d8b3;
  font-size:12px;
  text-shadow:0 2px 3px rgba(0,0,0,0.85);
}
.footer-link{
  color:#2f7bdc;
  text-decoration:underline;
}
@media(max-width:800px){
  footer{
    font-size:8px;
    white-space:nowrap;
  }
}
</style>
</head>

<body>

<video id="bgvid" autoplay muted loop playsinline>
  <source src="burn.mp4" type="video/mp4">
</video>
<div id="overlay"></div>

<a class="topLinkCard" href="https://nummus.meme" target="_blank" rel="noopener">Nummus.meme</a>

<!-- HEADER: LOGO - TITOLO - LOGO -->
<div id="headerBar">
  <div class="logoCard">
    <img src="nummus.png" alt="Nummus logo">
  </div>

  <div class="titleCard">
    <div class="title">NUMMUS — BURN LIVE</div>
  </div>

  <div class="logoCard">
    <img src="nummus.png" alt="Nummus logo">
  </div>
</div>

<div id="main">

  <!-- CARDS -->
  <div class="cardsLayout">

    <!-- Sinistra: Total Burned + USD Burned -->
    <div class="card">
      <label>Total Burned</label>
      <div class="value" id="burnTotal">—</div>

      <label style="margin-top:10px;">Total USD Burned</label>
      <div class="value" id="burnUSD">—</div>
    </div>

    <!-- Burn Address -->
    <div class="card">
      <label>Burn Address</label>
      <div class="value">
        <a class="link" href="https://solscan.io/account/5G62fW1BuK6k9B6sGwvTBtoKRPseshj9SSYPzudSPUYE" target="_blank">
          5G62fW1B…SPUYE
        </a>
      </div>
    </div>

    <!-- Total Supply -->
    <div class="card">
      <label>Total Supply</label>
      <div class="value" id="supply">—</div>
    </div>

    <!-- Price + Last Update -->
    <div class="card">
      <label>Nummus Price</label>
      <div class="value" id="priceNummus">—</div>

      <label style="margin-top:10px;">Last Update</label>
      <div class="value" id="update">—</div>
    </div>

  </div>

  <!-- TABELLA -->
  <div class="transactionsTable" tabindex="0" aria-label="Burn transactions">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Amount</th>
          <th>Date and time</th>
          <th>Transaction</th>
        </tr>
      </thead>
      <tbody id="burnRows">
        <tr><td colspan="4" style="padding:20px;text-align:center;">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- GRAFICO SUPPLY -->
  <section class="supplyChart" aria-labelledby="supplyChartTitle">
    <div class="chartHeader">
      <div class="chartTitle">
        <h2 id="supplyChartTitle">Supply Reduction</h2>
        <p id="chartDateRange">Historical NUMMUS supply after burns</p>
      </div>
      <div class="chartControls">
        <strong id="chartSupplyValue">—</strong>
        <div class="rangeSelector" aria-label="Chart range">
          <button type="button" data-chart-range="1D">1D</button>
          <button type="button" data-chart-range="7D">7D</button>
          <button type="button" data-chart-range="30D">30D</button>
          <button type="button" data-chart-range="1Y">1Y</button>
          <button type="button" data-chart-range="ALL" class="active">ALL</button>
        </div>
      </div>
    </div>
    <div class="chartPlot" id="supplyChartPlot">
      <svg id="supplyChartSvg" viewBox="0 0 960 340" role="img" aria-label="NUMMUS supply reduction over time"></svg>
      <div class="chartTooltip" id="supplyChartTooltip" role="tooltip"></div>
    </div>
  </section>

</div>

<script>
const chartState = {
  range: "ALL",
  history: [],
  points: []
};

const CHART = {
  width: 960,
  height: 340,
  left: 90,
  right: 24,
  top: 24,
  bottom: 48,
  minSupply: 90000000,
  maxSupply: 100000000
};

const numberFormatter = new Intl.NumberFormat("en-US", {maximumFractionDigits: 2});

async function loadData(){
  try{
    const cacheBuster = Date.now();
    const [burn, price] = await Promise.all([
      fetch(`data/burn.json?t=${cacheBuster}`).then(r=>r.json()),
      fetch(`data/price.json?t=${cacheBuster}`).then(r=>r.json())
    ]);

    document.getElementById("burnTotal").textContent =
      Number(burn.totalUi).toLocaleString();

    document.getElementById("burnUSD").textContent =
      Number(price.burnTotalUsd).toLocaleString("en-US",{style:"currency",currency:"USD"});

    document.getElementById("supply").textContent =
      Number(price.totalSupplyTokensNum).toLocaleString();

    document.getElementById("priceNummus").textContent =
      Number(price.priceUsd).toFixed(6)+" USD";

    document.getElementById("update").textContent =
      price.updatedAt ? new Date(price.updatedAt).toLocaleString() : "—";

    const tbody = document.getElementById("burnRows");
    tbody.innerHTML = "";

    burn.burns.forEach((b,i)=>{
      const dateTime = b.timestamp
        ? new Date(b.timestamp).toLocaleString("it-IT", {
            dateStyle: "short",
            timeStyle: "short"
          })
        : "—";
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${i+1}</td>
        <td>${Number(b.amountUi).toLocaleString()}</td>
        <td>${dateTime}</td>
        <td><a class="link" href="${b.url}" target="_blank" rel="noopener">Solscan</a></td>
      `;
      tbody.appendChild(tr);
    });

    chartState.history = buildSupplyHistory(burn.burns, Number(price.totalSupplyTokensNum));
    renderSupplyChart();

  }catch(e){
    console.error(e);
    showChartEmpty("Unable to load supply history.");
  }
}

function buildSupplyHistory(burns, currentSupply){
  if(!Number.isFinite(currentSupply)) return [];

  const burnedByDate = new Map();
  for(const burn of burns){
    const amount = Number(burn.amountUi);
    const date = burn.timestamp ? new Date(burn.timestamp) : null;
    if(!Number.isFinite(amount) || !date || Number.isNaN(date.getTime())) continue;
    const day = date.toISOString().slice(0,10);
    burnedByDate.set(day, (burnedByDate.get(day) || 0) + amount);
  }

  const dailyBurns = [...burnedByDate.entries()]
    .map(([date, amount])=>({date, amount}))
    .sort((a,b)=>a.date.localeCompare(b.date));
  const totalBurned = dailyBurns.reduce((sum,item)=>sum+item.amount,0);
  let burnedCumulative = 0;

  return dailyBurns.map(item=>{
    burnedCumulative += item.amount;
    return {
      date:item.date,
      supply:currentSupply + totalBurned - burnedCumulative,
      burnedCumulative
    };
  });
}

function filterChartHistory(history, range){
  if(range === "ALL" || history.length === 0) return history;
  const latest = new Date(`${history.at(-1).date}T00:00:00Z`);
  const days = range === "1D" ? 1 : range === "7D" ? 7 : range === "30D" ? 30 : 365;
  const cutoff = new Date(latest);
  cutoff.setUTCDate(cutoff.getUTCDate()-days);
  return history.filter(item=>new Date(`${item.date}T00:00:00Z`) >= cutoff);
}

function renderSupplyChart(){
  const history = filterChartHistory(chartState.history, chartState.range);
  if(history.length === 0){
    showChartEmpty("Supply history will appear after the next automatic data update.");
    return;
  }

  const svg = document.getElementById("supplyChartSvg");
  const plot = document.getElementById("supplyChartPlot");
  plot.querySelector(".chartEmpty")?.remove();
  svg.style.display = "block";

  const plotWidth = CHART.width-CHART.left-CHART.right;
  const plotHeight = CHART.height-CHART.top-CHART.bottom;
  const firstTime = Date.parse(`${history[0].date}T00:00:00Z`);
  const lastTime = Date.parse(`${history.at(-1).date}T00:00:00Z`);
  const timeSpan = lastTime-firstTime || 1;
  const dataMin = Math.min(...history.map(item=>item.supply));
  const dataMax = Math.max(...history.map(item=>item.supply));
  const yMin = Math.min(CHART.minSupply, Math.floor(dataMin/1000000)*1000000);
  const yMax = Math.max(CHART.maxSupply, Math.ceil(dataMax/1000000)*1000000);

  chartState.points = history.map(item=>{
    const time = Date.parse(`${item.date}T00:00:00Z`);
    const x = history.length === 1
      ? CHART.left+plotWidth/2
      : CHART.left+((time-firstTime)/timeSpan)*plotWidth;
    const y = CHART.top+(1-(item.supply-yMin)/(yMax-yMin))*plotHeight;
    return {...item,x,y};
  });

  const linePath = chartState.points.length === 1
    ? `M ${CHART.left} ${chartState.points[0].y.toFixed(2)} L ${CHART.width-CHART.right} ${chartState.points[0].y.toFixed(2)}`
    : chartState.points.map((point,index)=>`${index ? "L" : "M"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
  const areaPath = chartState.points.length === 1
    ? `${linePath} L ${CHART.width-CHART.right} ${CHART.height-CHART.bottom} L ${CHART.left} ${CHART.height-CHART.bottom} Z`
    : `${linePath} L ${chartState.points.at(-1).x.toFixed(2)} ${CHART.height-CHART.bottom} L ${chartState.points[0].x.toFixed(2)} ${CHART.height-CHART.bottom} Z`;
  const yTicks = Array.from({length:5},(_,i)=>yMin+((yMax-yMin)/4)*i);
  const xIndexes = [...new Set([0,Math.floor((history.length-1)/2),history.length-1])];

  svg.innerHTML = `
    <defs>
      <linearGradient id="supplyGradient" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#b63b3b" stop-opacity="0.34" />
        <stop offset="100%" stop-color="#b63b3b" stop-opacity="0.03" />
      </linearGradient>
    </defs>
    <text class="chartAxisTitle" x="${CHART.left}" y="15">NUMMUS</text>
    ${yTicks.map(value=>{
      const y = CHART.top+(1-(value-yMin)/(yMax-yMin))*plotHeight;
      return `<line class="chartGrid" x1="${CHART.left}" y1="${y}" x2="${CHART.width-CHART.right}" y2="${y}" />
        <text class="chartLabel" x="${CHART.left-12}" y="${y+4}" text-anchor="end">${formatCompact(value)}</text>`;
    }).join("")}
    ${xIndexes.map(index=>{
      const point = chartState.points[index];
      return `<text class="chartLabel" x="${point.x}" y="${CHART.height-18}" text-anchor="middle">${formatChartDate(point.date)}</text>`;
    }).join("")}
    <line class="chartAxis" x1="${CHART.left}" y1="${CHART.height-CHART.bottom}" x2="${CHART.width-CHART.right}" y2="${CHART.height-CHART.bottom}" />
    <line class="chartAxis" x1="${CHART.left}" y1="${CHART.top}" x2="${CHART.left}" y2="${CHART.height-CHART.bottom}" />
    <path class="supplyArea" d="${areaPath}" />
    <path class="supplyLine" d="${linePath}" />
    <line class="chartCrosshair" id="chartCrosshair" y1="${CHART.top}" y2="${CHART.height-CHART.bottom}" />
    <circle class="chartHoverDot" id="chartHoverDot" r="5" />
    <rect class="chartCapture" x="${CHART.left}" y="${CHART.top}" width="${plotWidth}" height="${plotHeight}" />
  `;

  const latest = history.at(-1);
  document.getElementById("chartSupplyValue").textContent = `${numberFormatter.format(latest.supply)} NUMMUS`;
  document.getElementById("chartDateRange").textContent =
    `${formatChartDate(history[0].date)} → ${formatChartDate(latest.date)}`;
}

function showChartEmpty(message){
  chartState.points = [];
  const svg = document.getElementById("supplyChartSvg");
  const plot = document.getElementById("supplyChartPlot");
  svg.style.display = "none";
  plot.querySelector(".chartEmpty")?.remove();
  const empty = document.createElement("div");
  empty.className = "chartEmpty";
  empty.textContent = message;
  plot.appendChild(empty);
  document.getElementById("chartSupplyValue").textContent = "—";
  document.getElementById("chartDateRange").textContent = "Historical NUMMUS supply after burns";
}

function formatCompact(value){
  return `${(value/1000000).toFixed(value%1000000===0 ? 0 : 1)}M`;
}

function formatChartDate(date){
  return new Date(`${date}T00:00:00Z`).toLocaleDateString("it-IT",{
    day:"2-digit",month:"2-digit",year:"2-digit",timeZone:"UTC"
  });
}

function hideChartTooltip(){
  document.getElementById("supplyChartTooltip").style.display = "none";
  const crosshair = document.getElementById("chartCrosshair");
  const dot = document.getElementById("chartHoverDot");
  if(crosshair) crosshair.style.display = "none";
  if(dot) dot.style.display = "none";
}

document.querySelectorAll("[data-chart-range]").forEach(button=>{
  button.addEventListener("click",()=>{
    chartState.range = button.dataset.chartRange;
    document.querySelectorAll("[data-chart-range]").forEach(item=>item.classList.toggle("active",item===button));
    hideChartTooltip();
    renderSupplyChart();
  });
});

document.getElementById("supplyChartSvg").addEventListener("pointermove",event=>{
  if(chartState.points.length===0) return;
  const svg = event.currentTarget;
  const rect = svg.getBoundingClientRect();
  const x = ((event.clientX-rect.left)/rect.width)*CHART.width;
  const point = chartState.points.reduce((nearest,current)=>
    Math.abs(current.x-x)<Math.abs(nearest.x-x) ? current : nearest
  );
  const crosshair = document.getElementById("chartCrosshair");
  const dot = document.getElementById("chartHoverDot");
  crosshair.setAttribute("x1",point.x);
  crosshair.setAttribute("x2",point.x);
  crosshair.style.display = "block";
  dot.setAttribute("cx",point.x);
  dot.setAttribute("cy",point.y);
  dot.style.display = "block";

  const tooltip = document.getElementById("supplyChartTooltip");
  tooltip.replaceChildren();
  const title = document.createElement("strong");
  title.textContent = new Date(`${point.date}T00:00:00Z`).toLocaleDateString("it-IT",{
    day:"2-digit",month:"long",year:"numeric",timeZone:"UTC"
  });
  tooltip.appendChild(title);
  [["Supply",`${numberFormatter.format(point.supply)} NUMMUS`],["Burned",numberFormatter.format(point.burnedCumulative)]].forEach(([label,value])=>{
    const row = document.createElement("div");
    row.className = "tooltipRow";
    const name = document.createElement("span");
    const amount = document.createElement("b");
    name.textContent = label;
    amount.textContent = value;
    row.append(name,amount);
    tooltip.appendChild(row);
  });
  tooltip.style.display = "block";
  tooltip.style.left = `${(point.x/CHART.width)*rect.width}px`;
  tooltip.style.top = `${(point.y/CHART.height)*rect.height}px`;
});

document.getElementById("supplyChartSvg").addEventListener("pointerleave",hideChartTooltip);

loadData();
setInterval(loadData, 60000);
</script>
